version: '3.8'

services:
  # ----------------------------------------
  # 1. The React Frontend Service
  # ----------------------------------------
  frontend:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "8090:80"
    depends_on:
      - backend

  # ----------------------------------------
  # 2. The PHP Backend API Service
  # ----------------------------------------
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8091:80"
    depends_on:
      - db

  # ----------------------------------------
  # 3. The MySQL Database Service
  # ----------------------------------------
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Chacha@1583
      MYSQL_DATABASE: charleedash_db       # Docker automatically creates this empty DB
    volumes:
      # This volume persists your data so it isn't lost when containers stop
      - db_data:/var/lib/mysql
      # This line maps your local SQL dump to the container's initialization folder
      - ./charleedash_dump.sql:/docker-entrypoint-initdb.d/init.sql
      
  # ----------------------------------------
  # 4. Database Management Dashboard
  # ----------------------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8092:80" # Opens the dashboard on port 8092
    environment:
      PMA_HOST: db # Tells phpMyAdmin to connect to your MySQL container
    depends_on:
      - db

volumes:
  db_data: