name: CharleeDash+ Direct Deployment

# Triggers the workflow every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Live Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # These are the commands that will run directly inside your live server
          script: |
            # 1. Navigate to where your project lives on the server
            cd ~/Group2
            
            # 2. Pull the latest code securely from GitHub
            git pull origin main
            
            # 3. Force Docker to rebuild the images with the new code and restart seamlessly
            docker compose up -d --build --remove-orphans